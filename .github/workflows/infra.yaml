---
name: Infra Workflow
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: Action to perform
        required: true
        default: plan
        type: choice
        options:
          - apply
          - destroy
permissions:
  contents: read
  id-token: write
jobs:
  terraform_workflow:
    name: terraform apply
    if: ${{ github.event.inputs.action == 'apply'}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: setup OIDC connection
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.IAM_ROLE }}
          aws-region: us-east-1
          audience: sts.amazonaws.com
      - name: Verify AWS Connection
        run: aws sts get-caller-identity
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.6

      - name: terraform init
        run: terraform init
      
      - name: tf lint
        run: |
          curl -L https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
        
      - name: initialize tflint
        run: tflint --init
      
      - name: Run tflint
        run: tflint
     
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: 3.9
      - name: Test with Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: /infra
          framework: terraform 
      - name: creating infra 
        run: terraform apply --auto-approve
          
  terraform_destory:
    name: terraform_destory
    if: ${{ github.event.inputs == 'destory '}}
    runs-on: ubuntu-latest

    steps: 
      - name: destory infra
        run: terraform destory --auto-approve
