---
name: Drift Detection automation
on:
    workflow_dispatch:
     inputs:
      action:
        description: Action to perform
        required: true
        default: plan
        type: choice
        options:
          - drift-scan
permissions:
  contents: read
  id-token: write
  security-events: write
jobs:
 
  terraform_workflow:
    name: infra drift detection
    if: ${{ github.event.inputs.action == 'drift-scan'}}
    runs-on: ubuntu-latest
    env: 
      slack_weebhook: ${{ secrets.SLACK_TOKEN}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: setup OIDC connection
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.IAM_ROLE }}
          aws-region: us-east-1
          audience: sts.amazonaws.com
      - name: Verify AWS Connection
        run: aws sts get-caller-identity
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.6

      - name: terraform fmt
        working-directory: ./infra
        run: terraform fmt
      - name: installing JQ
        run: sudo apt-get install jq -y

      - name: terraform init
        working-directory: ./infra
        run: terraform init
       
  
      - name: validating drift detection
        working-directory: ./infra
        run: |
         terraform plan -detailed-exitcode -out=tfplan.binary
         EXIT_CODE=$?
         if [ $EXIT_CODE -eq 0 ] then;
            echo "No Drift Detected"
            exit 0

         elif [ $EXIT_CODE -eq 2 ] then;
            echo "Drift Detected"
            terrform show -json tfplan.binary | jq -r '.resource_changes[].address' > drifted_resources.txt
            echo "Drifted resources:"
            cat drifted_resources.txt
            exit 2
         else [ $EXIT_CODE -eq 1 ] then;
            echo "Error in terraform plan"
            exit 1
         fi 
      - name: slack notification
        if: failure()
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "channel: "drift-detection",
              "attachments": [
                {
                  "color": "#ff0000",
                  "title": "Drift Detection Alert",
                  "text": "Drift detected in the infrastructure. Please check the drifted resources.",
                  "fields": [
                    {
                      "title": "Drifted Resources",
                      "value": "$(cat drifted_resources.txt)",
                      "short": false
                      
                      }
                  ]
                    
                }
              ]
            } 
              

      
          
  