syntax = "proto3";

package kubescope.report.v1;

import "scanner.proto";

// Source of truth for these shapes today: lib/report-generator.ts and
// lib/report-storage.ts. report-service owns the `reports` /
// `scheduled_reports` schema. It does NOT read the `scans` table directly —
// it calls RbacScannerService.ListScansByCluster (see scanner.proto) to get
// scan data, since rbac-scanner-service owns that schema.
//
// Trigger mechanism (core-api -> report-service): async via AWS SQS + KEDA.
// core-api calls CreateReport (fast, inserts the row in 'generating' state so
// the frontend sees it immediately), then enqueues a job message on SQS.
// report-service consumes the queue and runs the heavy generation; KEDA
// scales report-service replicas on queue depth. GenerateReport remains as
// the synchronous fallback used when SQS_QUEUE_URL is not configured
// (local dev without AWS) and by the scheduled-report runner in-process.

enum ReportType {
  REPORT_TYPE_UNSPECIFIED = 0;
  COMPLIANCE = 1;
  RISK_ASSESSMENT = 2;
  RBAC_AUDIT = 3;
  TREND_ANALYSIS = 4;
}

enum ReportFormat {
  REPORT_FORMAT_UNSPECIFIED = 0;
  JSON = 1;
  CSV = 2;
  PDF = 3;
}

enum ReportStatus {
  REPORT_STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  COMPLETED = 2;
  FAILED = 3;
}

// ============================================
// REPORT DATA SECTIONS (mirrors report-generator.ts)
// ============================================

message FlatRBACRow {
  string cluster = 1;
  string subject = 2;
  string type = 3;
  string namespace = 4;
  string role = 5;
  string resource = 6;
  string verbs = 7;
  string risk = 8;
  string issue = 9;
  string recommendation = 10;
}

message ClusterMetadata {
  string name = 1;
  string scan_date = 2; // ISO 8601
  int32 subjects = 3;
  int32 roles = 4;
  int32 bindings = 5;
}

message RbacSummary {
  int32 total_subjects = 1;
  int32 total_roles = 2;
  int32 total_bindings = 3;
}

message ComplianceSection {
  repeated ClusterMetadata cluster_metadata = 1;
  RbacSummary rbac_summary = 2;
  repeated kubescope.scanner.v1.RBACFinding top_findings = 3;
  repeated string recommendations = 4;
}

message AffectedSubject {
  string name = 1;
  string type = 2;
  int32 finding_count = 3;
  string highest_severity = 4;
}

message FindingList {
  repeated kubescope.scanner.v1.RBACFinding findings = 1;
}

message RiskAssessmentSection {
  kubescope.scanner.v1.ScanRiskCounts severity_distribution = 1;
  repeated AffectedSubject affected_subjects = 2;
  map<string, FindingList> findings_by_category = 3;
}

message ScanComparisonPoint {
  string cluster = 1;
  string scan_date = 2; // ISO 8601
  kubescope.scanner.v1.ScanRiskCounts risks = 3;
}

message RiskChange {
  string severity = 1;
  int32 previous = 2;
  int32 current = 3;
  int32 change = 4;
}

message TrendAnalysisSection {
  repeated ScanComparisonPoint scans_compared = 1;
  repeated RiskChange risk_changes = 2;
  repeated kubescope.scanner.v1.RBACFinding new_risks = 3;
  repeated kubescope.scanner.v1.RBACFinding resolved_risks = 4;
}

message ReportData {
  string workspace_id = 1;
  string workspace_name = 2;
  repeated string clusters = 3;
  ReportType report_type = 4;
  ReportFormat format = 5;
  string generated_at = 6; // ISO 8601
  kubescope.scanner.v1.ScanTotals summary = 7;
  kubescope.scanner.v1.ScanRiskCounts risks = 8;
  repeated kubescope.scanner.v1.RBACFinding findings = 9;
  repeated FlatRBACRow rbac_rows = 10;

  // Type-specific sections — only one set depending on report_type
  optional ComplianceSection compliance = 11;
  optional RiskAssessmentSection risk_assessment = 12;
  optional TrendAnalysisSection trend_analysis = 13;
}

// ============================================
// RPCs
// ============================================

message GenerateReportRequest {
  // If empty, report-service generates a new report id and persists a new row.
  // If set, it updates the existing row (used by scheduled-report runs).
  string report_id = 1;
  string workspace_id = 2;
  string workspace_name = 3;
  repeated string clusters = 4;
  ReportType report_type = 5;
  ReportFormat format = 6;
  string report_name = 7;
  repeated string scan_ids = 8;
}

message GenerateReportResponse {
  string report_id = 1;
  ReportStatus status = 2;
  ReportData report_data = 3;
  bytes file_content = 4;
  string file_size = 5;
  string error_message = 6; // set when status == FAILED
}

// Inserts the report row in 'generating' state and returns its id without
// doing any generation work. Used by core-api on the async (SQS) path so the
// report is visible in ListReports while the job waits in the queue.
message CreateReportRequest {
  string workspace_id = 1;
  string report_name = 2;
  ReportType report_type = 3;
  ReportFormat format = 4;
  repeated string clusters = 5;
  repeated string scan_ids = 6;
}

message CreateReportResponse {
  string report_id = 1;
}

message GetReportRequest {
  string workspace_id = 1;
  string report_id = 2;
}

message GetReportResponse {
  ReportStatus status = 1;
  ReportData report_data = 2;
  string file_size = 3;
  string error_message = 4;
  // The rendered report file bytes (JSON/CSV/PDF) for re-download. Empty if the
  // report failed or is still generating.
  bytes file_content = 5;
  ReportFormat format = 6;
  string report_name = 7;
}

// Persisted report row (report-service owns the `report.reports` table).
message Report {
  string id = 1;
  string workspace_id = 2;
  repeated string scan_ids = 3;
  string report_name = 4;
  ReportType report_type = 5;
  ReportFormat format = 6;
  repeated string clusters = 7;
  ReportStatus status = 8;
  kubescope.scanner.v1.ScanRiskCounts risk_summary = 9;
  string file_size = 10;
  string error_message = 11;
  string created_at = 12;
  string updated_at = 13;
}

message ListReportsRequest {
  string workspace_id = 1;
}

message ListReportsResponse {
  repeated Report reports = 1;
}

message DeleteReportRequest {
  string workspace_id = 1;
  string report_id = 2;
}

message DeleteReportResponse {
  bool deleted = 1;
}

// ============================================
// SCHEDULED REPORTS
// ============================================

enum ScheduleFrequency {
  SCHEDULE_FREQUENCY_UNSPECIFIED = 0;
  DAILY = 1;
  WEEKLY = 2;
  MONTHLY = 3;
}

message ScheduledReport {
  string id = 1;
  string workspace_id = 2;
  string name = 3;
  ReportType report_type = 4;
  ReportFormat format = 5;
  repeated string clusters = 6;
  ScheduleFrequency frequency = 7;
  optional string slack_webhook_url = 8;
  optional string notify_email = 9;
  bool enabled = 10;
  string next_run_at = 11;
  optional string last_run_at = 12;
  optional string last_run_status = 13; // "success" | "failed"
  optional string last_run_error = 14;
  optional string last_report_id = 15;
  string created_at = 16;
  string updated_at = 17;
}

message ListScheduledReportsRequest {
  string workspace_id = 1;
}

message ListScheduledReportsResponse {
  repeated ScheduledReport scheduled_reports = 1;
}

message CreateScheduledReportRequest {
  string workspace_id = 1;
  string workspace_name = 2;
  string name = 3;
  ReportType report_type = 4;
  ReportFormat format = 5;
  repeated string clusters = 6;
  ScheduleFrequency frequency = 7;
  optional string slack_webhook_url = 8;
  optional string notify_email = 9;
}

message CreateScheduledReportResponse {
  ScheduledReport scheduled_report = 1;
}

message DeleteScheduledReportRequest {
  string workspace_id = 1;
  string scheduled_report_id = 2;
}

message DeleteScheduledReportResponse {
  bool deleted = 1;
}

message ToggleScheduledReportRequest {
  string workspace_id = 1;
  string scheduled_report_id = 2;
  bool enabled = 3;
}

message ToggleScheduledReportResponse {
  ScheduledReport scheduled_report = 1;
}

// Invoked by core-api's cron endpoint (Vercel cron -> core-api -> here).
// Runs every scheduled report whose next_run_at <= now and enabled = true,
// generating each report and firing Slack notifications. Workspace name is
// resolved by report-service is not possible (it doesn't own workspaces), so
// core-api passes a name lookup is omitted — reports use the stored name.
message RunDueScheduledReportsRequest {
  // Optional cap on how many due reports to process in one invocation.
  int32 limit = 1;
}

message RunDueScheduledReportsResponse {
  int32 processed = 1;
  int32 succeeded = 2;
  int32 failed = 3;
}

service ReportService {
  rpc GenerateReport(GenerateReportRequest) returns (GenerateReportResponse);
  rpc CreateReport(CreateReportRequest) returns (CreateReportResponse);
  rpc GetReport(GetReportRequest) returns (GetReportResponse);
  rpc ListReports(ListReportsRequest) returns (ListReportsResponse);
  rpc DeleteReport(DeleteReportRequest) returns (DeleteReportResponse);

  rpc ListScheduledReports(ListScheduledReportsRequest) returns (ListScheduledReportsResponse);
  rpc CreateScheduledReport(CreateScheduledReportRequest) returns (CreateScheduledReportResponse);
  rpc DeleteScheduledReport(DeleteScheduledReportRequest) returns (DeleteScheduledReportResponse);
  rpc ToggleScheduledReport(ToggleScheduledReportRequest) returns (ToggleScheduledReportResponse);
  rpc RunDueScheduledReports(RunDueScheduledReportsRequest) returns (RunDueScheduledReportsResponse);
}
